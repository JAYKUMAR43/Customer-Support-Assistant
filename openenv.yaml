name: "fullstack-ecommerce-support-env"
version: "1.0.0"
description: "A high-end, full-stack environment for training e-commerce support agents with real-time UI/UX dashboard."
tags: ["openenv", "fullstack", "react", "fastapi", "customer-support"]
author: "Antigravity AI"

environment:
    type: "HTTP"
    port: 8000
    endpoints:
        reset: "/reset"
        step: "/step"
        state: "/state"
        config: "/config"

observation_space:
    customer_query: "text"
    order_value: "float"
    customer_type: "enum [NEW, FREQUENT, RISKY]"
    issue_type: "enum [DELAYED, DAMAGED, WRONG_ITEM, REFUND_REQUEST]"
    sentiment_score: "float (0.0-1.0)"
    conversation_history: "list of {role: string, content: string}"
    task_id: "text"

action_space:
    action_type: "enum [REFUND, REPLACE, ESCALATE, RESPOND, CLARIFY]"
    explanation: "text"
    response_text: "text"

reward_range: [0.0, 1.0]
tasks:
    - id: "TASK_EASY"
      level: "easy"
    - id: "TASK_MEDIUM"
      level: "medium"
    - id: "TASK_HARD"
      level: "hard"
